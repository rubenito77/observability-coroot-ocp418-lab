apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-demo
  namespace: coroot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: traffic-demo
  template:
    metadata:
      labels:
        app: traffic-demo
    spec:
      containers:
      - name: echo
        image: hashicorp/http-echo
        args:
        - "-text=hello from coroot demo"
        ports:
        - containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: traffic-demo
  namespace: coroot
spec:
  selector:
    app: traffic-demo
  ports:
  - port: 80
    targetPort: 5678
