apiVersion: apps/v1
kind: Deployment
metadata:
  name: traffic-generator
  namespace: coroot
spec:
  replicas: 1
  selector:
    matchLabels:
      app: traffic-generator
  template:
    metadata:
      labels:
        app: traffic-generator
    spec:
      containers:
      - name: curl
        image: curlimages/curl
        command:
        - /bin/sh
        - -c
        - |
          while true; do
            curl -s http://traffic-demo.coroot.svc.cluster.local > /dev/null
            sleep 0.2
          done
