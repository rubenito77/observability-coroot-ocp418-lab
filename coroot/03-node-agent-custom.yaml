apiVersion: v1
kind: ServiceAccount
metadata:
  name: coroot-node-agent-custom
  namespace: coroot
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: coroot-node-agent-custom
  namespace: coroot
  labels:
    app.kubernetes.io/component: coroot-node-agent-custom
spec:
  selector:
    matchLabels:
      app.kubernetes.io/component: coroot-node-agent-custom
  template:
    metadata:
      labels:
        app.kubernetes.io/component: coroot-node-agent-custom
    spec:
      serviceAccountName: coroot-node-agent-custom
      hostPID: true
      tolerations:
      - operator: Exists
      containers:
      - name: node-agent
        image: ghcr.io/coroot/coroot-node-agent:1.28.3
        args:
        - --cgroupfs-root=/host/sys/fs/cgroup
        - --disable-l7-tracing
        env:
        - name: COLLECTOR_ENDPOINT
          value: http://coroot-coroot.coroot:8080
        - name: SCRAPE_INTERVAL
          value: 15s
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 500m
            memory: 1Gi
        volumeMounts:
        - name: cgroupfs
          mountPath: /host/sys/fs/cgroup
          readOnly: true
        - name: tracefs
          mountPath: /sys/kernel/tracing
        - name: debugfs
          mountPath: /sys/kernel/debug
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: cgroupfs
        hostPath:
          path: /sys/fs/cgroup
      - name: tracefs
        hostPath:
          path: /sys/kernel/tracing
      - name: debugfs
        hostPath:
          path: /sys/kernel/debug
      - name: tmp
        emptyDir: {}
